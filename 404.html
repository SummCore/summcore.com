<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | SummCore</title>
  <link rel="icon" type="image/png" href="/Logo/SC23.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 560px; }
    .logo { height: 72px; margin-bottom: 24px; }
    h1 { font-size: 2.25rem; margin-bottom: 12px; }
    .code { color: #fbbf24; font-weight: 700; letter-spacing: 0.1em; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 16px; }
    p { color: #cbd5e1; font-size: 1.125rem; line-height: 1.6; margin-bottom: 28px; }
    .btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-block; padding: 12px 28px; border-radius: 9999px;
      font-weight: 600; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
    }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .btn-primary { background: #fe2700; color: #fff; }
    .btn-secondary { border: 2px solid #fbbf24; color: #fcd34d; }
    .btn-secondary:hover { background: #fbbf24; color: #0f172a; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/Logo/SC23.png" alt="SummCore logo">

    <div class="btns">
      <a class="btn btn-primary" href="/">Back to SummCore</a>
      <a class="btn btn-secondary" href="tel:+442922715325">Call Sage: 029 2271 5325</a>
    </div>
  </div>
